<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Solar System</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 20;

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Light
const light = new THREE.PointLight(0xffffff, 2, 1000);
scene.add(light);

// Sun
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(3, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffff00 })
);
scene.add(sun);

// Stars
function createStars() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];

  for (let i = 0; i < 10000; i++) {
    vertices.push(
      (Math.random() - 0.5) * 2000,
      (Math.random() - 0.5) * 2000,
      (Math.random() - 0.5) * 2000
    );
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const material = new THREE.PointsMaterial({ color: 0xffffff });
  const stars = new THREE.Points(geometry, material);
  scene.add(stars);
}
createStars();

// Planet creator
function createPlanet(size, color, distance, speed) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(size, 32, 32),
    new THREE.MeshStandardMaterial({ color })
  );

  scene.add(mesh);

  return { mesh, distance, speed, angle: Math.random() * Math.PI * 2 };
}

// Planets
const mercury = createPlanet(0.4, 0xaaaaaa, 5, 0.04);
const venus   = createPlanet(0.6, 0xffcc99, 7, 0.03);
const earth   = createPlanet(0.7, 0x0000ff, 9, 0.02);
const mars    = createPlanet(0.5, 0xff0000, 11, 0.018);
const jupiter = createPlanet(1.5, 0xffa500, 14, 0.01);
const saturn  = createPlanet(1.2, 0xffd27f, 18, 0.008);
const uranus  = createPlanet(1.0, 0x66ffff, 22, 0.006);
const neptune = createPlanet(1.0, 0x3333ff, 26, 0.005);

// Moon
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.2, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);
scene.add(moon);

// Animation
function animate() {
  requestAnimationFrame(animate);

  const planets = [mercury, venus, earth, mars, jupiter, saturn, uranus, neptune];

  planets.forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
  });

  // Moon orbit around Earth
  moon.position.x = earth.mesh.position.x + Math.cos(Date.now() * 0.002) * 1.5;
  moon.position.z = earth.mesh.position.z + Math.sin(Date.now() * 0.002) * 1.5;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
